services:
  - type: web
    name: nexus-social-media
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
        placeholder: "mongodb+srv://username:password@cluster.mongodb.net/social-media-app"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
